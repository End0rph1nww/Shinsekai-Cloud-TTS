<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud TTS</title>
    <style>
      /* P3 落地 neobrutalism 设计系统前的占位页（studio.css / studio.js 在 P3 引入） */
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        background: #f5f1e8;
        color: #111;
      }
      .card {
        border: 3px solid #111;
        border-radius: 10px;
        box-shadow: 5px 5px 0 0 #111;
        background: #fff;
        padding: 24px 32px;
        max-width: 420px;
      }
      h1 { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
      p { margin: 4px 0; font-size: 14px; line-height: 1.6; }
      code { background: #ffd23f; padding: 0 4px; border: 1px solid #111; border-radius: 4px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Cloud TTS 音色工作台</h1>
      <p>React 工作台界面将在 P3 阶段上线。</p>
      <p>当前 API 面已可用：<code>load_values</code> / <code>save_values</code> / 10 个 actions。</p>
      <p>在此之前请继续使用 Qt 设置窗口的 Cloud TTS 页。</p>
    </main>
  </body>
</html>
